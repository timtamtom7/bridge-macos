name: Bridge
options:
  bundleIdPrefix: com.bridgeapp
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Bridge:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/*.md"
          - "**/*.py"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bridgeapp.bridge
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Bridge.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - "-F"
          - "/Library/Apple/System/Library/PrivateFrameworks"
          - "-framework"
          - MobileDevice
    dependencies:
      - package: SQLite
        product: SQLite
